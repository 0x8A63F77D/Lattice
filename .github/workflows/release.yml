name: Release

# Runs ONLY on version tags (v1.2.3) or a manual dispatch. Never on branch
# pushes — normal CI lives in ci.yml. A tag build publishes a GitHub Release
# with every platform's artifacts attached; workflow_dispatch is a dry run that
# builds and uploads the artifacts but publishes nothing.
on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to stamp for a dry-run build (no release is published)'
        required: false
        default: '0.0.0-dev'

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  package:
    name: package (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5
        with:
          # MinVer computes the version from git tags + commit height, so the
          # packaging scripts (packaging/version.sh) and the assembly build need
          # the FULL history — a shallow clone would misreport the version and,
          # under -warnaserror elsewhere, warn. fetch-depth: 0 fetches all history
          # and tags.
          fetch-depth: 0

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      # Validate the version, and for a dry run pin it. A real tag PUSH derives the
      # version from the pushed tag via MinVer (v1.2.3 -> 1.2.3), stamping both the
      # assembly and every artifact filename — so nothing is set here. But we still
      # FAIL FAST if the tag is not a version MinVer will honour (e.g. `vnext` or
      # `v0.2`): otherwise MinVer would silently fall back to an older height-based
      # version while the release job still publishes a Release named after that
      # tag, so the artifacts wouldn't match the tag. A workflow_dispatch DRY RUN
      # has no tag, so its input pins the version via MinVer's override env var —
      # honoured identically by the assembly build and by packaging/version.sh, so
      # filename == stamped version. The free-form values are read via env (never
      # spliced into the script body) so a value like $(...) can't be evaluated —
      # GitHub's script-injection guidance.
      - name: Resolve and validate version
        shell: bash
        env:
          DISPATCH_VERSION: ${{ github.event.inputs.version }}
        run: |
          if [ "$GITHUB_EVENT_NAME" = "workflow_dispatch" ]; then
            VERSION="$DISPATCH_VERSION"
          else
            VERSION="${GITHUB_REF_NAME#v}"
          fi
          # Require a full SemVer core (major.minor.patch) + optional -prerelease,
          # matching what MinVer accepts as a version tag — so a tag that passes
          # here is exactly one MinVer will honour, closing the fall-back gap above.
          # `+build` metadata is rejected on purpose: the release job's pre-release
          # test keys off a bare '-'. The [[ =~ ]] whole-string match (^…$, no
          # multiline) plus the >1-line guard also stop an embedded newline from
          # injecting extra $GITHUB_ENV entries.
          if [ "$(printf '%s' "$VERSION" | wc -l)" -ne 0 ] \
             || ! [[ "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.]+)?$ ]]; then
            echo "::error::Invalid version '$VERSION' (expected e.g. 1.2.3 or 0.0.0-dev)"
            exit 1
          fi
          # Only a dry run overrides MinVer; a tag push lets MinVer read the tag.
          if [ "$GITHUB_EVENT_NAME" = "workflow_dispatch" ]; then
            echo "MinVerVersionOverride=$VERSION" >> "$GITHUB_ENV"
          fi

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: ./packaging/windows/build-zip.ps1 -Rid win-x64

      - name: Package (macOS)
        if: runner.os == 'macOS'
        shell: bash
        run: |
          packaging/macos/make-dmg.sh osx-arm64
          packaging/macos/make-dmg.sh osx-x64

      - name: Package (Linux)
        if: runner.os == 'Linux'
        shell: bash
        run: |
          packaging/linux/build-appimage.sh linux-x64
          packaging/linux/build-tarball.sh linux-x64

      # Collect just the shippable artifacts (skip the intermediate publish/
      # AppDir/.app trees). merge-multiple in the release job flattens these.
      - name: Stage artifacts
        shell: bash
        run: |
          mkdir -p dist
          find artifacts -type f \
            \( -name '*.zip' -o -name '*.dmg' -o -name '*.AppImage' -o -name '*.tar.gz' \) \
            -exec cp {} dist/ \;
          ls -lh dist

      - uses: actions/upload-artifact@v4
        with:
          name: lattice-${{ matrix.os }}
          path: dist/**
          if-no-files-found: error

  release:
    name: publish release
    needs: package
    # Only a real tag PUSH publishes a Release. The event_name guard matters:
    # a workflow_dispatch started against a tag ref also has ref_type == 'tag',
    # and dispatches are documented as dry runs — so gate on push explicitly so
    # a manual tag dispatch can't publish. Dry runs stop after the package job
    # (artifacts remain downloadable from the run).
    if: github.event_name == 'push' && github.ref_type == 'tag'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          echo "Assets:" && ls -lh dist
          # Flag SemVer pre-releases so GitHub doesn't mark them "Latest".
          # GitHub only excludes a release from "Latest" when it's flagged as a
          # pre-release; without the flag a tag like v0.1.0-beta.1 would publish
          # as a normal release and become the repo's Latest — shadowing a later
          # stable v1 and misdirecting download links / auto-updaters. A tag is a
          # pre-release exactly when its name carries a SemVer pre-release suffix,
          # i.e. it contains a '-' (v1.2.3 -> stable; v0.1.0-beta.1 -> pre-release).
          # Build-metadata tags (SemVer '+') never reach here: the Resolve-version
          # regex rejects '+', so a bare '-' test is sufficient.
          PRERELEASE=""
          case "$GITHUB_REF_NAME" in *-*) PRERELEASE="--prerelease" ;; esac
          gh release create "$GITHUB_REF_NAME" \
            --repo "$GITHUB_REPOSITORY" \
            --title "Lattice $GITHUB_REF_NAME" \
            --generate-notes \
            $PRERELEASE \
            $(find dist -type f | sort)
