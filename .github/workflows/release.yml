name: Release

# Runs ONLY on version tags (v1.2.3) or a manual dispatch. Never on branch
# pushes — normal CI lives in ci.yml. A tag build publishes a GitHub Release
# with every platform's artifacts attached; workflow_dispatch is a dry run that
# builds and uploads the artifacts but publishes nothing.
on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to stamp for a dry-run build (no release is published)'
        required: false
        default: '0.0.0-dev'

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  package:
    name: package (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5
        with:
          # MinVer computes the version from git tags + commit height, so the
          # packaging scripts (packaging/version.sh) and the assembly build need
          # the FULL history — a shallow clone would misreport the version and,
          # under -warnaserror elsewhere, warn. fetch-depth: 0 fetches all history
          # and tags.
          fetch-depth: 0

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      # Resolve the version, and fail fast if a tag push can't produce a Release
      # whose artifacts match the tag.
      #
      # Tag PUSH: MinVer derives the version from the pushed tag and stamps both the
      # assembly and every artifact filename. The one hazard is a `v*` tag that
      # MinVer does NOT accept as a SemVer 2.0 version (e.g. `vnext`, `v0.2`,
      # `v01.2.3`, `v1.2.3-01`): MinVer then silently falls back to an older
      # height-based version, yet the release job still publishes a Release named
      # after the tag — so its artifacts wouldn't match. Rather than approximate
      # MinVer's SemVer rules with a regex (which keeps drifting from the real
      # parser — two review rounds proved that), we ask MinVer itself for the
      # version it will stamp and require it to EQUAL the tag. Exact by construction:
      # if MinVer honoured the tag they match; if it ignored the tag the fallback
      # won't, and we stop before publishing.
      #
      # DRY RUN (workflow_dispatch): no tag, nothing published. The input pins the
      # version via MinVer's override env var, which BOTH the assembly build and
      # packaging/version.sh read — one source, so filename == stamped version and a
      # mismatch is structurally impossible here. A light sanity check just gives an
      # early, readable error. The free-form input is read via env (never spliced
      # into the script body) so a value like $(...) can't be evaluated — GitHub's
      # script-injection guidance.
      - name: Resolve and validate version
        shell: bash
        env:
          DISPATCH_VERSION: ${{ github.event.inputs.version }}
        run: |
          if [ "$GITHUB_EVENT_NAME" = "workflow_dispatch" ]; then
            VERSION="$DISPATCH_VERSION"
            if [ "$(printf '%s' "$VERSION" | wc -l)" -ne 0 ] \
               || ! [[ "$VERSION" =~ ^[0-9A-Za-z][0-9A-Za-z.-]*$ ]]; then
              echo "::error::Invalid dry-run version '$VERSION' (expected e.g. 1.2.3 or 0.0.0-dev)"
              exit 1
            fi
            # Honoured identically by the assembly build and packaging/version.sh.
            echo "MinVerVersionOverride=$VERSION" >> "$GITHUB_ENV"
          else
            EXPECTED="${GITHUB_REF_NAME#v}"
            # The one authority on whether the tag is a usable version is MinVer.
            ACTUAL="$(dotnet msbuild src/Lattice.App/Lattice.App.csproj -t:MinVer -getProperty:Version -restore -nologo)"
            if [ "$ACTUAL" != "$EXPECTED" ]; then
              echo "::error::Tag '$GITHUB_REF_NAME' is not a valid SemVer 2.0 version tag: MinVer resolved '$ACTUAL', not '$EXPECTED', so it would fall back and the Release artifacts would not match the tag. Push a tag like v1.2.3 or v1.2.3-alpha.1."
              exit 1
            fi
          fi

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: ./packaging/windows/build-zip.ps1 -Rid win-x64

      - name: Package (macOS)
        if: runner.os == 'macOS'
        shell: bash
        run: |
          packaging/macos/make-dmg.sh osx-arm64
          packaging/macos/make-dmg.sh osx-x64

      - name: Package (Linux)
        if: runner.os == 'Linux'
        shell: bash
        run: |
          packaging/linux/build-appimage.sh linux-x64
          packaging/linux/build-tarball.sh linux-x64

      # Collect just the shippable artifacts (skip the intermediate publish/
      # AppDir/.app trees). merge-multiple in the release job flattens these.
      - name: Stage artifacts
        shell: bash
        run: |
          mkdir -p dist
          find artifacts -type f \
            \( -name '*.zip' -o -name '*.dmg' -o -name '*.AppImage' -o -name '*.tar.gz' \) \
            -exec cp {} dist/ \;
          ls -lh dist

      - uses: actions/upload-artifact@v4
        with:
          name: lattice-${{ matrix.os }}
          path: dist/**
          if-no-files-found: error

  release:
    name: publish release
    needs: package
    # Only a real tag PUSH publishes a Release. The event_name guard matters:
    # a workflow_dispatch started against a tag ref also has ref_type == 'tag',
    # and dispatches are documented as dry runs — so gate on push explicitly so
    # a manual tag dispatch can't publish. Dry runs stop after the package job
    # (artifacts remain downloadable from the run).
    if: github.event_name == 'push' && github.ref_type == 'tag'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          echo "Assets:" && ls -lh dist
          # Flag SemVer pre-releases so GitHub doesn't mark them "Latest".
          # GitHub only excludes a release from "Latest" when it's flagged as a
          # pre-release; without the flag a tag like v0.1.0-beta.1 would publish
          # as a normal release and become the repo's Latest — shadowing a later
          # stable v1 and misdirecting download links / auto-updaters. A tag is a
          # pre-release exactly when its name carries a SemVer pre-release suffix,
          # i.e. it contains a '-' (v1.2.3 -> stable; v0.1.0-beta.1 -> pre-release).
          # Build-metadata tags (SemVer '+') never reach here: the Resolve-version
          # regex rejects '+', so a bare '-' test is sufficient.
          PRERELEASE=""
          case "$GITHUB_REF_NAME" in *-*) PRERELEASE="--prerelease" ;; esac
          gh release create "$GITHUB_REF_NAME" \
            --repo "$GITHUB_REPOSITORY" \
            --title "Lattice $GITHUB_REF_NAME" \
            --generate-notes \
            $PRERELEASE \
            $(find dist -type f | sort)
