name: Mutation Tier 2

# Nightly regression audit (issue #77): full Stryker over the pinned mutation
# scope, score posted to the tracking issue. Never blocks PRs (scheduled run).
# stryker-config.json now sets thresholds.break = 80, so a regression below it makes
# the Stryker step exit non-zero; the post step runs `if: always()` so the tracking
# issue is still updated with the regression score on that path.

on:
  schedule:
    - cron: '30 3 * * *'
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  stryker-full:
    name: stryker-full (nightly audit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x
      - run: dotnet tool restore
      - name: Stryker (full scoped run)
        working-directory: tests/Lattice.Tests
        run: dotnet dotnet-stryker
      - name: Post score to tracking issue
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: bash scripts/post-mutation-report.sh 77
